version: "3.8"

services:
  ecourses:
    image: thomasaawaddockerest/ecourses:v1.1
    ports:
      - "80:80"
      - "5000:5000"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: always
    depends_on:
      - ecourses

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: always
    depends_on:
      - prometheus

volumes:
  grafana-storage: